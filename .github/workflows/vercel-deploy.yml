name: Deploy to Vercel

# Production deploy on every push to master. The build runs on the CI runner
# (vercel build executes the buildCommand from vercel.json, which installs
# Deno and runs `deno task setup`), then only the prebuilt output is uploaded.
#
# Required repository secrets (until they exist, the job logs a warning and
# skips instead of failing):
#   VERCEL_TOKEN      - personal/team token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     - "orgId" from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID - "projectId" from .vercel/project.json after `vercel link`

on:
    push:
        branches: [master]

concurrency:
    group: vercel-production
    cancel-in-progress: false

env:
    VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Check Vercel secrets
              id: secrets
              run: |
                  if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
                      echo "configured=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "configured=false" >> "$GITHUB_OUTPUT"
                      echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets are not set - skipping deploy"
                  fi

            - uses: actions/checkout@v4
              if: steps.secrets.outputs.configured == 'true'

            - name: Install Vercel CLI
              if: steps.secrets.outputs.configured == 'true'
              run: npm install -g vercel@latest

            - name: Pull Vercel environment
              if: steps.secrets.outputs.configured == 'true'
              run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

            - name: Build
              if: steps.secrets.outputs.configured == 'true'
              run: vercel build --prod --token="$VERCEL_TOKEN"

            - name: Deploy
              if: steps.secrets.outputs.configured == 'true'
              run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
