name: Deploy to Vercel

# Production deploy on every push to master. We build the frontend on the CI
# runner with Deno (the same `deno task build-frontend` used locally), assemble
# a Vercel Build Output API v3 directory from dist/, and upload only that
# prebuilt output. This avoids `vercel build`, whose remote/emulated build path
# runs `npm run build` and chokes on the `jsr:` imports in vite.config.ts.
#
# Required repository secrets (until they exist, the job logs a warning and
# skips instead of failing):
#   VERCEL_TOKEN      - personal/team token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     - "orgId" from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID - "projectId" from .vercel/project.json after `vercel link`

on:
    push:
        branches: [master]

concurrency:
    group: vercel-production
    cancel-in-progress: false

env:
    VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Check Vercel secrets
              id: secrets
              run: |
                  if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
                      echo "configured=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "configured=false" >> "$GITHUB_OUTPUT"
                      echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets are not set - skipping deploy"
                  fi

            - uses: actions/checkout@v4
              if: steps.secrets.outputs.configured == 'true'

            - name: Set up Deno
              if: steps.secrets.outputs.configured == 'true'
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Install frontend deps
              if: steps.secrets.outputs.configured == 'true'
              run: deno task install-frontend-deps

            - name: Build frontend
              if: steps.secrets.outputs.configured == 'true'
              run: deno task build-frontend

            - name: Assemble Vercel prebuilt output
              if: steps.secrets.outputs.configured == 'true'
              run: |
                  mkdir -p .vercel/output/static
                  cp -r dist/. .vercel/output/static/
                  echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/.*","dest":"/index.html"}]}' > .vercel/output/config.json

            - name: Install Vercel CLI
              if: steps.secrets.outputs.configured == 'true'
              run: npm install -g vercel@latest

            - name: Deploy prebuilt output
              if: steps.secrets.outputs.configured == 'true'
              run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
