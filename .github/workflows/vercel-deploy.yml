name: Deploy to Vercel

# Production deploy on every push to master. The build runs on the CI runner
# (vercel build executes the buildCommand from vercel.json, which installs
# Deno and runs `deno task setup`), then only the prebuilt output is uploaded.
#
# Required repository secrets:
#   VERCEL_TOKEN      - personal/team token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     - "orgId" from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID - "projectId" from .vercel/project.json after `vercel link`

on:
  push:
    branches: [master]

concurrency:
  group: vercel-production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
